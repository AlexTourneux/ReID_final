# Experiment 05: ResNet50 student distilled from exp01 (DinoV2-L teacher)
exp_id: exp05_student_resnet50_kd
seed: 42
device: auto
save_dir: checkpoints

backbone:
  name: resnet50
  pretrained: true

head:
  embedding_dim: 512

data:
  image_size: 224
  val_fraction: 0.05
  max_samples: null
  sources:
    - root: datasets/dataset_a
      parquet: our_train.parquet
      identity_offset: 0
    - root: datasets/market1501
      parquet: market1501_train.parquet
      identity_offset: 0

train:
  batch_size: 128
  num_workers: 4
  epochs: 25
  lr: 3.5e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2
  grad_clip: 1.0
  loss: arcface
  arcface_s: 30.0
  arcface_m: 0.5
  amp: true
  compile: true

early_stop:
  patience: 4
  val_every_epochs: 1

distillation:
  enabled: true
  teacher_backbone: vit_large_patch14_reg4_dinov2.lvd142m
  teacher_backbone_kwargs:
    img_size: 224
    dynamic_img_size: true
    global_pool: token  # DinoV2 was pretrained with CLS-token pooling
  teacher_embedding_dim: 512
  teacher_checkpoint: checkpoints/exp01_teacher_dinov2_large/best.pth
  alpha: 1.0   # weight on (arcface + triplet + ...)
  beta: 1.0    # weight on (1 - cos(student, teacher))
